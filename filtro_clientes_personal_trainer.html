
<style>
  .chat-wrap { max-width: 420px; margin: 0 auto; padding: 1rem 0 2rem; font-family: var(--font-sans); }
  .chat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; margin-bottom: 0; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 13px; color: #fff; flex-shrink: 0; }
  .header-info p { margin: 0; }
  .header-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .header-role { font-size: 12px; color: var(--color-text-secondary); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; display: inline-block; margin-right: 4px; }
  .chat-body { background: var(--color-background-secondary); border-left: 0.5px solid var(--color-border-tertiary); border-right: 0.5px solid var(--color-border-tertiary); min-height: 320px; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 82%; padding: 9px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .bot-bubble { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); align-self: flex-start; border-bottom-left-radius: 4px; }
  .user-bubble { background: #1D9E75; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 13px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 14px; border-bottom-left-radius: 4px; align-self: flex-start; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-secondary); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  .chat-footer { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-top: none; border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg); padding: 10px 12px 14px; }
  .btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn { padding: 7px 14px; font-size: 13px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, color 0.15s; font-family: var(--font-sans); }
  .btn:hover { background: var(--color-background-secondary); }
  .btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .btn.primary:hover { background: #0F6E56; border-color: #0F6E56; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .step-label { font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .progress { display: flex; gap: 4px; padding: 8px 12px; background: var(--color-background-primary); border-left: 0.5px solid var(--color-border-tertiary); border-right: 0.5px solid var(--color-border-tertiary); border-top: none; }
  .prog-seg { height: 3px; flex: 1; background: var(--color-border-tertiary); border-radius: 2px; transition: background 0.4s; }
  .prog-seg.done { background: #1D9E75; }
</style>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar">AN</div>
    <div class="header-info">
      <p class="header-name">Anderson Nunes</p>
      <p class="header-role"><span class="status-dot"></span>Personal Trainer · Online</p>
    </div>
  </div>
  <div class="progress" id="progress">
    <div class="prog-seg done" id="p0"></div>
    <div class="prog-seg" id="p1"></div>
    <div class="prog-seg" id="p2"></div>
    <div class="prog-seg" id="p3"></div>
    <div class="prog-seg" id="p4"></div>
    <div class="prog-seg" id="p5"></div>
  </div>
  <div class="chat-body" id="chat"></div>
  <div class="chat-footer" id="footer">
    <div class="step-label" id="step-label">Aguardando...</div>
    <div class="btns" id="btns"></div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const btnsEl = document.getElementById('btns');
const stepLabel = document.getElementById('step-label');
let choices = {};

const steps = [
  {
    prog: 0,
    label: "Introdução",
    bot: "Olá! Aqui é o Anderson Nunes, personal trainer.\n\nAntes de te indicar qualquer caminho, preciso entender o seu perfil. São só 5 perguntas rápidas — menos de 1 minuto. Pode ser?",
    options: [
      { label: "Pode ser, bora!", key: "start", primary: true, userMsg: "Pode ser, bora!", botReply: "Ótimo! Vamos direto ao ponto.", next: 1 },
      { label: "Agora não", key: "no", userMsg: "Agora não", botReply: "Tudo certo! Quando estiver no momento certo, é só me chamar. Estarei por aqui. 💪", next: -1 }
    ]
  },
  {
    prog: 1,
    label: "Pergunta 1 de 5 · Objetivo",
    bot: "Qual é o seu principal objetivo agora?",
    options: [
      { label: "Emagrecer", key: "obj", value: "emagrecimento", userMsg: "Emagrecer", botReply: "Emagrecer com saúde e de forma consistente é 100% possível com o método certo. Bom objetivo.", next: 2 },
      { label: "Ganhar massa", key: "obj", value: "ganho de massa", userMsg: "Ganhar massa", botReply: "Hipertrofia exige progressão inteligente e consistência. Com a estratégia certa, a diferença aparece rápido.", next: 2 },
      { label: "Condicionamento", key: "obj", value: "condicionamento", userMsg: "Melhorar condicionamento", botReply: "Condicionamento transforma disposição, saúde e desempenho. É uma base sólida para qualquer objetivo.", next: 2 },
      { label: "Saúde e qualidade de vida", key: "obj", value: "saúde e qualidade de vida", userMsg: "Saúde e qualidade de vida", botReply: "Qualidade de vida é o melhor objetivo que existe. É o que sustenta tudo no longo prazo.", next: 2 }
    ]
  },
  {
    prog: 2,
    label: "Pergunta 2 de 5 · Nível",
    bot: "Como você avaliaria seu nível atual de treinamento?",
    options: [
      { label: "Iniciante — estou começando", key: "nivel", value: "iniciante", userMsg: "Iniciante", botReply: "Começar do jeito certo faz toda a diferença — evita lesão e acelera o resultado desde o início.", next: 3 },
      { label: "Intermediário", key: "nivel", value: "intermediário", userMsg: "Intermediário", botReply: "Você já tem uma base. Agora é evoluir com estratégia, não só com esforço.", next: 3 },
      { label: "Avançado", key: "nivel", value: "avançado", userMsg: "Avançado", botReply: "No nível avançado, os detalhes separam bons resultados de resultados extraordinários.", next: 3 }
    ]
  },
  {
    prog: 3,
    label: "Pergunta 3 de 5 · Obstáculo",
    bot: "Qual desses fatores mais atrapalha você hoje?",
    options: [
      { label: "Não sei o que fazer", key: "trava", value: "falta de direção", userMsg: "Não sei o que fazer", botReply: "Faz sentido. Muita informação disponível, pouca direção clara. É exatamente isso que um plano personalizado resolve.", next: 4 },
      { label: "Falta de motivação", key: "trava", value: "falta de motivação", userMsg: "Falta de motivação", botReply: "Motivação oscila — é natural. O que não pode oscilar é o método. Com o treino certo e acompanhamento, isso muda.", next: 4 },
      { label: "Falta de tempo", key: "trava", value: "falta de tempo", userMsg: "Falta de tempo", botReply: "Menos tempo não significa menos resultado. 45 minutos bem planejados superam 2 horas no improviso.", next: 4 },
      { label: "Já tentei e não vi resultado", key: "trava", value: "falta de resultado", userMsg: "Já tentei e não vi resultado", botReply: "Sem resultado geralmente indica falta de método, não falta de esforço. Isso tem solução com a abordagem certa.", next: 4 }
    ]
  },
  {
    prog: 4,
    label: "Pergunta 4 de 5 · Frequência",
    bot: "Quantos dias por semana você consegue treinar?",
    options: [
      { label: "2x por semana", key: "freq", value: "2x", userMsg: "2x por semana", botReply: "Com 2 dias bem estruturados dá pra ter ótimos resultados — o segredo está na eficiência de cada sessão.", next: 5 },
      { label: "3x por semana", key: "freq", value: "3x", userMsg: "3x por semana", botReply: "3 dias é a frequência ideal para a maioria das pessoas. Consistência + recuperação = resultado de verdade.", next: 5 },
      { label: "4x ou mais", key: "freq", value: "4x ou mais", userMsg: "4x ou mais", botReply: "Com 4 dias ou mais, temos ainda mais possibilidades de personalização e progressão.", next: 5 },
      { label: "Ainda não sei", key: "freq", value: "a definir", userMsg: "Ainda não sei", botReply: "Sem problema. A gente define isso juntos com base na sua rotina — faz parte do planejamento.", next: 5 }
    ]
  },
  {
    prog: 5,
    label: "Última etapa",
    bot: "DIAGNOSTICO",
    options: [
      { label: "Quero, sim!", key: "cta", primary: true, userMsg: "Quero, sim!", botReply: "Perfeito. Me chama agora no WhatsApp — te explico como funciona e já te encaixo na primeira aula experimental, sem compromisso. Te espero lá. 👊", next: -1 },
      { label: "Tenho uma dúvida", key: "cta", userMsg: "Tenho uma dúvida", botReply: "Fique à vontade! Me conta o que você quer saber — pode mandar sem filtro. Tô aqui pra isso.", next: -1 }
    ]
  }
];

function updateProgress(prog) {
  for (let i = 0; i <= 5; i++) {
    document.getElementById('p' + i).className = 'prog-seg' + (i <= prog ? ' done' : '');
  }
}

function addBubble(text, type, delay = 0) {
  return new Promise(res => {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'bubble ' + type + '-bubble';
      b.style.whiteSpace = 'pre-line';
      b.textContent = text;
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
      res();
    }, delay);
  });
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function disableAllBtns() {
  btnsEl.querySelectorAll('.btn').forEach(b => b.disabled = true);
}

function buildDiagnostico() {
  const obj = choices.obj || 'seu objetivo';
  const nivel = choices.nivel || 'seu nível';
  const trava = choices.trava || 'seu desafio';
  const freq = choices.freq || 'seus dias disponíveis';
  return `Com base no seu perfil, já tenho uma visão clara do que você precisa:\n\n✔ Objetivo: ${obj}\n✔ Nível: ${nivel}\n✔ Principal obstáculo: ${trava}\n✔ Frequência: ${freq}\n\nA maioria das pessoas não vê resultado por falta de direção — não por falta de esforço.\n\nCom um plano ajustado ao seu perfil + acompanhamento profissional, você vai ter clareza sobre cada passo.\n\nPosso montar esse plano inicial pra você e te dar uma aula experimental pra sentir na prática. Topa?`;
}

async function runStep(stepIndex) {
  const s = steps[stepIndex];
  updateProgress(s.prog);
  stepLabel.textContent = s.label;

  btnsEl.innerHTML = '';
  showTyping();

  await new Promise(r => setTimeout(r, 900));
  removeTyping();

  const botText = s.bot === 'DIAGNOSTICO' ? buildDiagnostico() : s.bot;
  await addBubble(botText, 'bot');

  await new Promise(r => setTimeout(r, 300));

  s.options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'btn' + (opt.primary ? ' primary' : '');
    b.textContent = opt.label;
    b.onclick = () => handleChoice(opt, stepIndex);
    btnsEl.appendChild(b);
  });
}

async function handleChoice(opt, stepIndex) {
  disableAllBtns();
  btnsEl.innerHTML = '';
  stepLabel.textContent = '';

  if (opt.key && opt.value) choices[opt.key] = opt.value;

  await addBubble(opt.userMsg, 'user');
  await new Promise(r => setTimeout(r, 400));

  showTyping();
  await new Promise(r => setTimeout(r, 800));
  removeTyping();
  await addBubble(opt.botReply, 'bot');

  if (opt.next > 0) {
    await new Promise(r => setTimeout(r, 600));
    runStep(opt.next);
  } else {
    stepLabel.textContent = 'Conversa encerrada';
    const restartBtn = document.createElement('button');
    restartBtn.className = 'btn';
    restartBtn.textContent = 'Recomeçar simulação';
    restartBtn.onclick = () => { choices = {}; chat.innerHTML = ''; runStep(0); };
    btnsEl.appendChild(restartBtn);
  }
}

runStep(0);
</script>
